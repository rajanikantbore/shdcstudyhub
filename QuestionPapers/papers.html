<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Previous Question Papers</title>
    <link rel="icon" type="image/x-icon" href="/logoshdc.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style.css" />
  </head>

  <body>
    <div id="navbar"></div>

    <div class="container mt-4">
      <h2 class="mb-4 syllabus-title">📄 Previous question Papers</h2>

      <!-- Search Bar -->
      <!-- <input
        type="text"
        class="form-control mb-3"
        placeholder="Search subjects..."
        onkeyup="filterSubjects(this.value)"
      /> -->

      <!-- Tabs -->
      <ul class="nav nav-tabs" id="tabs">
        <li class="nav-item">
          <button class="nav-link active" onclick="openTab(this, 'bscPapers.html')">
            BSC
          </button>
        </li>

        <li class="nav-item">
          <button class="nav-link" onclick="openTab(this, 'bcomPapers.html')">
            BCOM
          </button>
        </li>

        <li class="nav-item">
          <button class="nav-link" onclick="openTab(this, 'bbaPapers.html')">
            BBA
          </button>
        </li>

        <li class="nav-item">
          <button class="nav-link" onclick="openTab(this, 'teluguPapers.html')">
            TELUGU
          </button>
        </li>

        <li class="nav-item">
          <button class="nav-link" onclick="openTab(this, 'englishPapers.html')">
            ENGLISH
          </button>
        </li>

        <li class="nav-item">
          <button class="nav-link" onclick="openTab(this, 'sanskritPapers.html')">
            SANSKRIT
          </button>
        </li>

        <li class="nav-item">
          <button
            class="nav-link"
            onclick="openTab(this, 'generalElectivePapers.html')"
          >
            GENERAL ELECTIVES
          </button>
        </li>

        <li class="nav-item">
          <button class="nav-link" onclick="openTab(this, 'secPapersPapers.html')">
            SEC PAPERS
          </button>
        </li>
      </ul>

      <!-- Content Area -->
      <div id="tabContent" class="mt-3"></div>
    </div>

    <div id="footer"></div>

    <script src="../JS/syllabus.js"></script>

    <script>
      loadTab("bscPapers.html"); // default tab
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      function loadComponent(id, file) {
        fetch(file)
          .then((res) => res.text())
          .then((data) => {
            document.getElementById(id).innerHTML = data;
          });
      }

      // Load navbar & footer
      loadComponent("navbar", "/components/navbar.html");
      loadComponent("footer", "/components/footer.html");
    </script>
  </body>
</html>
